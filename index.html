&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;epi-sequence-animation&#x27;);
  const playButton = root.querySelector(&#x27;#epi-play&#x27;);
  const stepButton = root.querySelector(&#x27;#epi-step&#x27;);
  const resetButton = root.querySelector(&#x27;#epi-reset&#x27;);
  const speedInput = root.querySelector(&#x27;#epi-speed&#x27;);
  const speedValue = root.querySelector(&#x27;#epi-speed-value&#x27;);
  const eventBadge = root.querySelector(&#x27;#epi-event-badge&#x27;);
  const eventLabel = root.querySelector(&#x27;#epi-event-label&#x27;);
  const lineLabel = root.querySelector(&#x27;#epi-line-label&#x27;);
  const grid = root.querySelector(&#x27;#epi-grid&#x27;);
  const completedPath = root.querySelector(&#x27;#epi-completed-path&#x27;);
  const currentSegment = root.querySelector(&#x27;#epi-current-segment&#x27;);
  const currentSamples = root.querySelector(&#x27;#epi-current-samples&#x27;);
  const kPoint = root.querySelector(&#x27;#epi-k-point&#x27;);
  const kLabel = root.querySelector(&#x27;#epi-k-label&#x27;);
  const rfWave = root.querySelector(&#x27;#epi-rf-wave&#x27;);
  const gxWave = root.querySelector(&#x27;#epi-gx-wave&#x27;);
  const gyWave = root.querySelector(&#x27;#epi-gy-wave&#x27;);
  const adcWindows = root.querySelector(&#x27;#epi-adc-windows&#x27;);
  const teMarker = root.querySelector(&#x27;#epi-te-marker&#x27;);
  const teLabel = root.querySelector(&#x27;#epi-te-label&#x27;);
  const playhead = root.querySelector(&#x27;#epi-playhead&#x27;);
  const timeLabel = root.querySelector(&#x27;#epi-time-label&#x27;);

  const NS = &#x27;http://www.w3.org/2000/svg&#x27;;
  const lineCount = 9;
  const sampleCount = 21;
  const cx = 265;
  const cy = 250;
  const left = 65;
  const right = 465;
  const top = 70;
  const bottom = 430;
  const waveLeft = 84;
  const waveRight = 690;
  let eventIndex = 0;
  let eventProgress = 0;
  let playing = false;
  let lastTimestamp = null;
  let animationFrame = null;

  function svgElement(name, attributes) {
    const element = document.createElementNS(NS, name);
    Object.entries(attributes).forEach(([key, value]) =&gt; element.setAttribute(key, value));
    return element;
  }

  function clearGroup(group) {
    while (group.firstChild) group.removeChild(group.firstChild);
  }

  function lineY(line) {
    return bottom - line * ((bottom - top) / (lineCount - 1));
  }

  const events = [
    {type: &#x27;rf&#x27;, duration: 0.55, label: &#x27;RF excitation: k-space origin&#x27;},
    {type: &#x27;prephase&#x27;, duration: 0.9, label: &#x27;Gx + Gy prephasing: move to lower-left k-space&#x27;}
  ];
  for (let line = 0; line &lt; lineCount; line += 1) {
    const forward = line % 2 === 0;
    events.push({
      type: &#x27;readout&#x27;,
      duration: 1.0,
      line,
      forward,
      label: `Gx ${forward ? &#x27;positive&#x27; : &#x27;negative&#x27;} readout: acquire ky line ${line + 1}`
    });
    if (line &lt; lineCount - 1) {
      events.push({
        type: &#x27;blip&#x27;,
        duration: 0.32,
        line,
        label: `Gy blip: advance to ky line ${line + 2}`
      });
    }
  }

  const totalDuration = events.reduce((sum, event) =&gt; sum + event.duration, 0);
  const eventStarts = [];
  let runningTime = 0;
  events.forEach((event) =&gt; {
    eventStarts.push(runningTime);
    runningTime += event.duration;
  });

  function timeToX(time) {
    return waveLeft + (time / totalDuration) * (waveRight - waveLeft);
  }

  function eventStartPosition(index) {
    const event = events[index];
    if (event.type === &#x27;rf&#x27; || event.type === &#x27;prephase&#x27;) return {x: cx, y: cy};
    if (event.type === &#x27;readout&#x27;) {
      return {x: event.forward ? left : right, y: lineY(event.line)};
    }
    const priorReadout = events[index - 1];
    return {x: priorReadout.forward ? right : left, y: lineY(event.line)};
  }

  function eventEndPosition(index) {
    const event = events[index];
    if (event.type === &#x27;rf&#x27;) return {x: cx, y: cy};
    if (event.type === &#x27;prephase&#x27;) return {x: left, y: bottom};
    if (event.type === &#x27;readout&#x27;) {
      return {x: event.forward ? right : left, y: lineY(event.line)};
    }
    const start = eventStartPosition(index);
    return {x: start.x, y: lineY(event.line + 1)};
  }

  function currentPosition() {
    const start = eventStartPosition(eventIndex);
    const end = eventEndPosition(eventIndex);
    return {
      x: start.x + (end.x - start.x) * eventProgress,
      y: start.y + (end.y - start.y) * eventProgress
    };
  }

  for (let i = 0; i &lt; lineCount; i += 1) {
    const y = lineY(i);
    grid.appendChild(svgElement(&#x27;line&#x27;, {
      class: &#x27;epi-grid-line&#x27;, x1: left, x2: right, y1: y, y2: y
    }));
  }
  for (let i = 0; i &lt; lineCount; i += 1) {
    const x = left + i * ((right - left) / (lineCount - 1));
    grid.appendChild(svgElement(&#x27;line&#x27;, {
      class: &#x27;epi-grid-line&#x27;, x1: x, x2: x, y1: top, y2: bottom
    }));
  }

  function waveformPath(channel, baseline, scale) {
    const points = [[waveLeft, baseline]];
    events.forEach((event, index) =&gt; {
      const startX = timeToX(eventStarts[index]);
      const endX = timeToX(eventStarts[index] + event.duration);
      let amplitude = 0;
      if (channel === &#x27;gx&#x27;) {
        if (event.type === &#x27;prephase&#x27;) amplitude = -0.72;
        if (event.type === &#x27;readout&#x27;) amplitude = event.forward ? 1 : -1;
      } else if (channel === &#x27;gy&#x27;) {
        if (event.type === &#x27;prephase&#x27;) amplitude = -0.72;
        if (event.type === &#x27;blip&#x27;) amplitude = 0.76;
      }
      points.push([startX, baseline]);
      points.push([startX, baseline - amplitude * scale]);
      points.push([endX, baseline - amplitude * scale]);
      points.push([endX, baseline]);
    });
    points.push([waveRight, baseline]);
    return points.map((point, index) =&gt; `${index === 0 ? &#x27;M&#x27; : &#x27;L&#x27;}${point[0]} ${point[1]}`).join(&#x27; &#x27;);
  }

  function buildWaveforms() {
    const rfStart = timeToX(eventStarts[0]);
    const rfEnd = timeToX(eventStarts[0] + events[0].duration);
    const rfCenter = (rfStart + rfEnd) / 2;
    rfWave.setAttribute(&#x27;d&#x27;, `M${waveLeft} 100 L${rfStart} 100 L${rfCenter - 13} 100 L${rfCenter - 8} 76 L${rfCenter - 3} 119 L${rfCenter + 3} 81 L${rfCenter + 8} 112 L${rfCenter + 13} 100 L${waveRight} 100`);
    gxWave.setAttribute(&#x27;d&#x27;, waveformPath(&#x27;gx&#x27;, 215, 48));
    gyWave.setAttribute(&#x27;d&#x27;, waveformPath(&#x27;gy&#x27;, 330, 44));

    clearGroup(adcWindows);
    events.forEach((event, index) =&gt; {
      if (event.type !== &#x27;readout&#x27;) return;
      const x1 = timeToX(eventStarts[index]);
      const x2 = timeToX(eventStarts[index] + event.duration);
      adcWindows.appendChild(svgElement(&#x27;rect&#x27;, {
        class: &#x27;epi-adc-window&#x27;, x: x1, y: 414, width: Math.max(1, x2 - x1), height: 21
      }));
    });

    const centerReadoutIndex = events.findIndex((event) =&gt; event.type === &#x27;readout&#x27; &amp;&amp; event.line === Math.floor(lineCount / 2));
    const teTime = eventStarts[centerReadoutIndex] + events[centerReadoutIndex].duration / 2;
    const teX = timeToX(teTime);
    teMarker.setAttribute(&#x27;x1&#x27;, teX);
    teMarker.setAttribute(&#x27;x2&#x27;, teX);
    teLabel.setAttribute(&#x27;x&#x27;, teX);
  }

  function drawCompletedTrajectory() {
    clearGroup(completedPath);
    for (let i = 0; i &lt; eventIndex; i += 1) {
      const event = events[i];
      if (event.type !== &#x27;readout&#x27; &amp;&amp; event.type !== &#x27;blip&#x27;) continue;
      const start = eventStartPosition(i);
      const end = eventEndPosition(i);
      completedPath.appendChild(svgElement(&#x27;line&#x27;, {
        class: event.type === &#x27;readout&#x27; ? &#x27;epi-complete-readout&#x27; : &#x27;epi-complete-blip&#x27;,
        x1: start.x, y1: start.y, x2: end.x, y2: end.y
      }));
      if (event.type === &#x27;readout&#x27;) {
        for (let sample = 0; sample &lt; sampleCount; sample += 1) {
          const fraction = sample / (sampleCount - 1);
          const x = start.x + (end.x - start.x) * fraction;
          completedPath.appendChild(svgElement(&#x27;circle&#x27;, {
            class: &#x27;epi-sample&#x27;, cx: x, cy: start.y, r: 2.5
          }));
        }
      }
    }
  }

  function drawCurrentSamples() {
    clearGroup(currentSamples);
    const event = events[eventIndex];
    if (event.type !== &#x27;readout&#x27;) return;
    const start = eventStartPosition(eventIndex);
    const end = eventEndPosition(eventIndex);
    const visibleCount = Math.floor(eventProgress * sampleCount);
    for (let sample = 0; sample &lt; visibleCount; sample += 1) {
      const fraction = sample / (sampleCount - 1);
      const x = start.x + (end.x - start.x) * fraction;
      currentSamples.appendChild(svgElement(&#x27;circle&#x27;, {
        class: &#x27;epi-sample&#x27;, cx: x, cy: start.y, r: 3
      }));
    }
  }

  function eventBadgeText(event) {
    if (event.type === &#x27;rf&#x27;) return &#x27;Excitation&#x27;;
    if (event.type === &#x27;prephase&#x27;) return &#x27;Prephase&#x27;;
    if (event.type === &#x27;readout&#x27;) return `Echo ${event.line + 1}`;
    return &#x27;Gy blip&#x27;;
  }

  function eventSecondaryText(event) {
    if (event.type === &#x27;rf&#x27;) return &#x27;Single-shot echo train&#x27;;
    if (event.type === &#x27;prephase&#x27;) return &#x27;Prepare the first readout line&#x27;;
    if (event.type === &#x27;readout&#x27;) {
      const direction = event.forward ? &#x27;−kx → +kx&#x27; : &#x27;+kx → −kx&#x27;;
      return `ky line ${event.line + 1} / ${lineCount} · ${direction}`;
    }
    return `Δky step after line ${event.line + 1}`;
  }

  function render() {
    const event = events[eventIndex];
    const start = eventStartPosition(eventIndex);
    const position = currentPosition();
    kPoint.setAttribute(&#x27;cx&#x27;, position.x);
    kPoint.setAttribute(&#x27;cy&#x27;, position.y);
    kLabel.setAttribute(&#x27;x&#x27;, Math.min(position.x + 12, 470));
    kLabel.setAttribute(&#x27;y&#x27;, Math.max(position.y - 12, 47));
    currentSegment.setAttribute(&#x27;x1&#x27;, start.x);
    currentSegment.setAttribute(&#x27;y1&#x27;, start.y);
    currentSegment.setAttribute(&#x27;x2&#x27;, position.x);
    currentSegment.setAttribute(&#x27;y2&#x27;, position.y);
    currentSegment.setAttribute(&#x27;class&#x27;, `epi-current-segment ${event.type === &#x27;readout&#x27; ? &#x27;is-gx&#x27; : event.type === &#x27;blip&#x27; ? &#x27;is-gy&#x27; : event.type === &#x27;prephase&#x27; ? &#x27;is-prephase&#x27; : &#x27;&#x27;}`);
    eventBadge.textContent = eventBadgeText(event);
    eventLabel.textContent = event.label;
    lineLabel.textContent = eventSecondaryText(event);
    const currentTime = eventStarts[eventIndex] + event.duration * eventProgress;
    const playheadX = timeToX(currentTime);
    playhead.setAttribute(&#x27;x1&#x27;, playheadX);
    playhead.setAttribute(&#x27;x2&#x27;, playheadX);
    timeLabel.setAttribute(&#x27;x&#x27;, Math.max(waveLeft + 12, Math.min(playheadX, waveRight - 35)));
    timeLabel.textContent = event.type === &#x27;readout&#x27; ? `echo ${event.line + 1}` : event.type === &#x27;blip&#x27; ? &#x27;Gy blip&#x27; : event.type;
    playButton.textContent = playing ? &#x27;Pause&#x27; : &#x27;Play&#x27;;
    drawCompletedTrajectory();
    drawCurrentSamples();
  }

  function advanceEvent() {
    if (eventIndex &lt; events.length - 1) {
      eventIndex += 1;
      eventProgress = 0;
      render();
      return true;
    }
    eventIndex = events.length;
    playing = false;
    drawCompletedTrajectory();
    eventBadge.textContent = &#x27;Complete&#x27;;
    eventLabel.textContent = &#x27;Single-shot EPI k-space acquisition complete&#x27;;
    lineLabel.textContent = `${lineCount} echoes acquired after one excitation`;
    playButton.textContent = &#x27;Replay&#x27;;
    return false;
  }

  function animate(timestamp) {
    if (!playing) return;
    if (lastTimestamp === null) lastTimestamp = timestamp;
    const delta = (timestamp - lastTimestamp) / 1000;
    lastTimestamp = timestamp;
    eventProgress += delta * Number(speedInput.value) / events[eventIndex].duration;
    if (eventProgress &gt;= 1) {
      eventProgress = 1;
      render();
      if (!advanceEvent()) return;
    } else {
      render();
    }
    animationFrame = requestAnimationFrame(animate);
  }

  function reset() {
    playing = false;
    lastTimestamp = null;
    eventIndex = 0;
    eventProgress = 0;
    if (animationFrame) cancelAnimationFrame(animationFrame);
    render();
  }

  playButton.addEventListener(&#x27;click&#x27;, () =&gt; {
    if (eventIndex &gt;= events.length) reset();
    playing = !playing;
    lastTimestamp = null;
    render();
    if (playing) animationFrame = requestAnimationFrame(animate);
  });

  stepButton.addEventListener(&#x27;click&#x27;, () =&gt; {
    playing = false;
    lastTimestamp = null;
    eventProgress = 1;
    render();
    advanceEvent();
  });

  resetButton.addEventListener(&#x27;click&#x27;, reset);
  speedInput.addEventListener(&#x27;input&#x27;, () =&gt; {
    speedValue.textContent = `${Number(speedInput.value).toFixed(1)}×`;
  });

  buildWaveforms();
  render();
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
